<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spam Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="nav-content">
      <div class="nav-brand">Spam Detector</div>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="about.html" class="nav-link">About the Models</a>
      </div>
    </div>
  </nav>

  <div class="wrapper">
    <!-- ── Header ── -->
    <header class="header">
      <h1>Spam Detector</h1>
    </header>

    <!-- ── Main card ── -->
    <main class="card" id="main-card">

      <!-- Model selector -->
      <div class="model-row">
        <label class="field-label" for="model-select">Model</label>
        <div class="model-pills" id="model-pills">
          <button class="pill active" data-model="svm">SVM</button>
          <button class="pill" data-model="naive_bayes">Naive Bayes</button>
          <button class="pill" data-model="logistic_regression">Logistic Reg</button>
          <button class="pill" data-model="all">Compare All</button>
        </div>
      </div>

      <!-- Text input -->
      <div class="field-group">
        <label class="field-label" for="msg-input">Message</label>
        <div class="textarea-wrap">
          <textarea
            id="msg-input"
            placeholder="Type or paste a message to analyze..."
            maxlength="2000"
            rows="5"
          ></textarea>
          <span class="char-count" id="char-count">0 / 2000</span>
        </div>
      </div>

      <!-- Action button -->
      <button class="check-btn" id="check-btn">
        <span class="btn-text">Analyse Message</span>
        <span class="btn-spinner" id="btn-spinner"></span>
      </button>

      <!-- Result area (hidden until response) -->
      <div class="result-area" id="result-area">

        <!-- Single model result -->
        <div class="result-single" id="result-single">
          <div class="result-badge" id="result-badge">SPAM</div>
          <div class="result-body">
            <div class="result-row">
              <span class="res-label">Prediction</span>
              <span class="res-value" id="res-prediction">—</span>
            </div>
            <div class="result-row">
              <span class="res-label">Spam probability</span>
              <span class="res-value" id="res-spam-prob">—</span>
            </div>
            <div class="result-row">
              <span class="res-label">Confidence</span>
              <span class="res-value" id="res-confidence">—</span>
            </div>
            <div class="result-row">
              <span class="res-label">Model</span>
              <span class="res-value" id="res-model">—</span>
            </div>
            <div class="result-row">
              <span class="res-label">Cleaned text</span>
              <span class="res-value small" id="res-cleaned">—</span>
            </div>
          </div>

          <!-- Confidence bar -->
          <div class="conf-bar-wrap">
            <div class="conf-bar-track">
              <div class="conf-bar-fill" id="conf-bar"></div>
            </div>
            <div class="conf-bar-labels">
              <span>HAM</span><span>SPAM</span>
            </div>
          </div>
        </div>

        <!-- All-models comparison table -->
        <div class="result-compare" id="result-compare">
          <h3 class="compare-title">Model Comparison</h3>
          <div class="compare-table" id="compare-table">
            <!-- filled by JS -->
          </div>
        </div>

      </div><!-- /result-area -->

      <!-- Error banner -->
      <div class="error-banner" id="error-banner">
        <span id="error-msg">Something went wrong.</span>
      </div>

    </main>

  </div><!-- /wrapper -->

  <script src="script.js"></script>
</body>
</html>
